name: release-please

# Two triggers, two responsibilities:
#
#   workflow_dispatch — invoked by `just release-stable` to open the
#     Release PR. This is the developer's explicit decision to cut a
#     stable release.
#
#   push: branches: main — detects when the Release PR has been merged
#     and creates the vX.Y.Z tag, which triggers release.yml to build
#     and publish binaries. Does NOT open new PRs on regular merges.
#
# See docs/adr/001-release-automation.md for the decision record.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
