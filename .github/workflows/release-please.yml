name: release-please

# Opens a Release PR accumulating all feat:/fix: commits since the last
# stable release. Triggered manually via `just release-stable` — never
# automatically. Merging the Release PR creates the vX.Y.Z tag, which
# triggers release.yml to build and publish binaries.
#
# See docs/adr/001-release-automation.md for the decision record.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
