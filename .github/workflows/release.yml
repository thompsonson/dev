name: release

# Build prebuilt `dev` binaries and attach them to a GitHub Release.
# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Produces static (musl) Linux binaries that also run under Termux, plus
# native macOS binaries. Assets are named dev-<target>.tar.gz with a
# matching .sha256, so scripts/bootstrap.sh can fetch the right one.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft

  build-upload:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            rustflags: "-C link-arg=-static-pie"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            rustflags: "-C link-arg=-static-pie"
          - target: x86_64-apple-darwin
            os: macos-latest
            rustflags: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            rustflags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross-compilation toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/dev"
          ARCHIVE="dev-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" dev
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" "${ARCHIVE}.sha256"

  publish-release:
    needs: build-upload
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo ${{ github.repository }}
